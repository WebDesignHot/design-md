name: Lint PR

# Runs `design-md lint` on every changed .md file in PRs that touch the
# design-md/ directory. Posts a summary comment so contributors see results
# without leaving the PR view.

on:
  pull_request:
    paths:
      - 'design-md/**.md'

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: List changed .md files
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          FILES=$(git diff --name-only --diff-filter=AM "$BASE_SHA" "$HEAD_SHA" -- 'design-md/*.md' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Changed files: $FILES"

      - name: Run design-md lint
        if: steps.changed.outputs.files != ''
        id: lint
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          npm install -g @webdesignhot/design-md@latest
          {
            echo "## design-md lint results"
            echo ""
            FAIL=0
            for f in $CHANGED_FILES; do
              echo "### \`$f\`"
              echo ""
              echo '```'
              if design-md lint "$f"; then
                :
              else
                FAIL=1
              fi
              echo '```'
              echo ""
            done
            if [ "$FAIL" = "1" ]; then
              echo "❌ One or more files have lint errors. Please fix and re-push."
            else
              echo "✅ All lint checks passed."
            fi
          } > /tmp/lint-report.md
          cat /tmp/lint-report.md
          echo "fail=$FAIL" >> "$GITHUB_OUTPUT"

      - name: Comment lint results on PR
        if: steps.changed.outputs.files != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: /tmp/lint-report.md
          header: design-md-lint

      - name: Fail job if lint had errors
        if: steps.lint.outputs.fail == '1'
        run: exit 1
